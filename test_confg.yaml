# iTOL Symbol Dataset Configuration Example

# Column in your metadata that contains unique node/ID names
id_column: library_ID

# Define one or more datasets to generate
datasets:

  # -----------------------------
  # 1. Country dataset
  # -----------------------------
  - column: country
    label: Country
    symbol: square           # human-readable symbol
    size: 6                  # max symbol size
    fill: 1                  # 1 = filled, 0 = outline only
    position: -1             # -1 = first external column
    colors:
      Netherlands: "#1f78b4"
      Germany: "#33a02c"
      France: "#e31a1c"
    default_color: "#b2df8a" # fallback color
    # Optional palette if no colors specified: "hue", "viridis", "brewer"

  # -----------------------------
  # 2. Azole resistance dataset
  # -----------------------------
  - column: azole_resistant
    label: Resistance
    symbol: circle
    size: 5
    fill: 1
    position: -2
    colors:
      Resistant: "#e31a1c"
      Susceptible: "#33a02c"
    default_color: "#ffff99"

  # -----------------------------
  # 3. Mating type with single-value color
  # -----------------------------
  - column: mating_type
    label: Mating type
    symbol: diamond
    size: 5
    fill: 1
    position: -3
    colors:
      MAT1-1: "#1f78b4"       # only MAT1-1 assigned a color
    default_color: "#a6cee3"   # all other types fallback to light blue

  # -----------------------------
  # 4. Presence/absence example
  # -----------------------------
  - column: has_mutation
    label: Mutation present
    symbol: circle
    size: 6
    fill: 1
    position: -4
    colors:
      Yes: "#ff0000"          # red filled circle
      No: "#ffffff"           # white circle (outline only)
    default_color: "#cccccc"
    # Optional: you can treat "Yes/No" or 1/0 as presence/absence

  # -----------------------------
  # 5. All remaining columns auto-generated
  # -----------------------------
  - column: all
    label: AllColumns
    symbol: circle
    size: 4
    fill: 1
    position: -5
    palette: viridis           # automatic color palette for all values not covered above
    default_color: "#808080"